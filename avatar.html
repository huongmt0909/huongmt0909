<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 40px;
    flex-wrap: wrap;
  }

  .avatar {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* ── VERSION 1: Indigo Gradient + Rotating Ring ── */
  .v1 {
    background: radial-gradient(circle at 35% 35%, #818cf8, #6366f1 40%, #4338ca 75%, #1e1b4b);
    box-shadow: 0 0 60px rgba(99,102,241,0.6), 0 0 120px rgba(99,102,241,0.3);
  }
  .v1 .ring {
    position: absolute; inset: -12px; border-radius: 50%;
    border: 3px solid transparent;
    background: conic-gradient(from 0deg, #6366f1, #8b5cf6, #ec4899, #6366f1) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: spin 3s linear infinite;
  }
  .v1 .ring2 {
    position: absolute; inset: -22px; border-radius: 50%;
    border: 1px dashed rgba(99,102,241,0.4);
    animation: spin 8s linear infinite reverse;
  }
  .v1 .glow {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 60%);
    animation: pulse 3s ease-in-out infinite;
  }
  .v1 .initials {
    font-family: system-ui, sans-serif;
    font-size: 130px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -8px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.3);
    position: relative; z-index: 2;
    animation: float 4s ease-in-out infinite;
  }

  /* ── VERSION 2: Dark + Neon Glow ── */
  .v2 {
    background: #0f172a;
    border: 2px solid rgba(99,102,241,0.3);
    box-shadow: 0 0 40px rgba(99,102,241,0.4), 0 0 80px rgba(99,102,241,0.2), inset 0 0 60px rgba(99,102,241,0.05);
  }
  .v2 .hex {
    position: absolute; inset: 20px;
    border-radius: 50%;
    border: 1px solid rgba(99,102,241,0.2);
    animation: spin 12s linear infinite;
  }
  .v2 .hex::before, .v2 .hex::after {
    content: '';
    position: absolute;
    inset: 15px;
    border-radius: 50%;
    border: 1px solid rgba(139,92,246,0.15);
  }
  .v2 .hex::after { inset: 30px; border-color: rgba(236,72,153,0.1); }
  .v2 .dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #818cf8;
    box-shadow: 0 0 10px #818cf8, 0 0 20px #818cf8;
    top: 12px; left: 50%; transform: translateX(-50%);
    animation: orbit 3s linear infinite;
    transform-origin: 0 188px;
  }
  .v2 .dot2 {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ec4899;
    box-shadow: 0 0 8px #ec4899;
    top: 12px; left: 50%; transform: translateX(-50%);
    animation: orbit 5s linear infinite reverse;
    transform-origin: 0 188px;
  }
  .v2 .initials {
    font-family: system-ui, sans-serif;
    font-size: 120px;
    font-weight: 900;
    letter-spacing: -6px;
    position: relative; z-index: 2;
    background: linear-gradient(135deg, #f8fafc, #c7d2fe, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(99,102,241,0.5));
    animation: float 4s ease-in-out infinite;
  }

  /* ── VERSION 3: Pink/Purple Vibrant ── */
  .v3 {
    background: linear-gradient(135deg, #1e1b4b, #312e81, #4c1d95);
    box-shadow: 0 0 60px rgba(139,92,246,0.5), 0 0 100px rgba(236,72,153,0.3);
  }
  .v3 .blob {
    position: absolute; border-radius: 50%;
    filter: blur(40px);
    animation: blobmove 6s ease-in-out infinite;
  }
  .v3 .blob1 { width: 200px; height: 200px; background: rgba(99,102,241,0.5); top: -20px; left: -20px; }
  .v3 .blob2 { width: 180px; height: 180px; background: rgba(236,72,153,0.4); bottom: -20px; right: -20px; animation-delay: -3s; }
  .v3 .blob3 { width: 150px; height: 150px; background: rgba(139,92,246,0.4); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -1.5s; }
  .v3 .initials {
    font-family: system-ui, sans-serif;
    font-size: 130px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -8px;
    position: relative; z-index: 2;
    text-shadow: 0 0 40px rgba(255,255,255,0.5), 0 4px 20px rgba(0,0,0,0.3);
    animation: float 4s ease-in-out infinite;
  }
  .v3 .ring-outer {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 2px solid rgba(236,72,153,0.5);
    animation: spin 6s linear infinite;
  }

  /* ── KEYFRAMES ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
  @keyframes orbit { to { transform: translateX(-50%) rotate(360deg); } }
  @keyframes blobmove {
    0%,100% { transform: scale(1) translate(0,0); }
    33%      { transform: scale(1.15) translate(10px,-10px); }
    66%      { transform: scale(0.9) translate(-10px,10px); }
  }

  /* Labels */
  .label {
    position: absolute;
    bottom: -36px;
    left: 50%;
    transform: translateX(-50%);
    color: #475569;
    font-family: system-ui;
    font-size: 13px;
    white-space: nowrap;
  }
  .wrapper { position: relative; padding-bottom: 40px; }

  /* Screenshot guide */
  .guide {
    position: fixed;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #475569; font-family: system-ui; font-size: 13px;
    background: rgba(15,23,42,0.8);
    padding: 10px 20px; border-radius: 8px;
    border: 1px solid #334155;
  }
</style>
</head>
<body>

<!-- V1: Indigo Classic -->
<div class="wrapper">
  <div class="avatar v1">
    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="glow"></div>
    <div class="initials">HM</div>
  </div>
  <div class="label">① Indigo Classic</div>
</div>

<!-- V2: Dark Neon -->
<div class="wrapper">
  <div class="avatar v2">
    <div class="hex"></div>
    <div class="dot"></div>
    <div class="dot2"></div>
    <div class="initials">HM</div>
  </div>
  <div class="label">② Dark Neon</div>
</div>

<!-- V3: Vibrant Blob -->
<div class="wrapper">
  <div class="avatar v3">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="ring-outer"></div>
    <div class="initials">HM</div>
  </div>
  <div class="label">③ Vibrant Blob</div>
</div>

<div class="guide">
  Chọn style bạn thích → DevTools (F12) → screenshot element → upload lên GitHub
</div>

</body>
</html>
