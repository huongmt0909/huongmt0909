<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="100%" height="60" preserveAspectRatio="none">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#ec4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#c4b5fd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Wave 1 -->
  <path fill="none" stroke="url(#waveGrad)" stroke-width="1.5">
    <animate attributeName="d"
      dur="6s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="
        M0,30 C150,10 300,50 450,30 C600,10 750,50 900,30 C1050,10 1150,40 1200,30;
        M0,30 C150,50 300,10 450,30 C600,50 750,10 900,30 C1050,50 1150,20 1200,30;
        M0,30 C150,10 300,50 450,30 C600,10 750,50 900,30 C1050,10 1150,40 1200,30
      "
    />
  </path>

  <!-- Wave 2 -->
  <path fill="none" stroke="url(#waveGrad2)" stroke-width="1">
    <animate attributeName="d"
      dur="8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      values="
        M0,35 C200,15 400,55 600,35 C800,15 1000,55 1200,35;
        M0,35 C200,55 400,15 600,35 C800,55 1000,15 1200,35;
        M0,35 C200,15 400,55 600,35 C800,15 1000,55 1200,35
      "
    />
  </path>

  <!-- Traveling dot -->
  <circle r="3" fill="#818cf8" opacity="0.8">
    <filter id="dotGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath>
        <path d="M0,30 C150,10 300,50 450,30 C600,10 750,50 900,30 C1050,10 1150,40 1200,30"/>
      </mpath>
    </animateMotion>
  </circle>

  <!-- Traveling dot 2 -->
  <circle r="2" fill="#ec4899" opacity="0.7">
    <animateMotion dur="6s" begin="-3s" repeatCount="indefinite">
      <mpath>
        <path d="M1200,30 C1050,50 900,10 750,30 C600,50 450,10 300,30 C150,50 50,20 0,30"/>
      </mpath>
    </animateMotion>
  </circle>
</svg>
