<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 64" width="100%" height="64">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="64" fill="#0d1117"/>

  <!-- Animated underline bar -->
  <rect x="0" y="60" height="2" fill="url(#sg)" rx="1">
    <animate attributeName="width" from="0" to="800" dur="1.5s" fill="freeze" begin="0.2s"/>
  </rect>

  <!-- Traveling dot on underline -->
  <circle cy="61" r="3" fill="#818cf8" filter="url(#glow)">
    <animate attributeName="cx" from="0" to="800" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Icon bar -->
  <rect x="28" y="18" width="4" height="28" rx="2" fill="#6366f1">
    <animate attributeName="height" values="28;20;28" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="18;22;18" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
  <rect x="36" y="24" width="4" height="22" rx="2" fill="#8b5cf6">
    <animate attributeName="height" values="22;28;22" dur="1.5s" begin="-0.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="24;18;24" dur="1.5s" begin="-0.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
  <rect x="44" y="20" width="4" height="26" rx="2" fill="#a78bfa">
    <animate attributeName="height" values="26;18;26" dur="1.5s" begin="-0.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="20;26;20" dur="1.5s" begin="-0.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Title -->
  <text x="62" y="39" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#f8fafc">
    GitHub Stats
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="0.1s"/>
  </text>

  <!-- Right side dots -->
  <circle cx="720" cy="32" r="4" fill="#6366f1" opacity="0.6">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="736" cy="32" r="4" fill="#8b5cf6" opacity="0.5">
    <animate attributeName="r" values="4;6;4" dur="2s" begin="-0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="-0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="752" cy="32" r="4" fill="#ec4899" opacity="0.4">
    <animate attributeName="r" values="4;6;4" dur="2s" begin="-1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="-1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
