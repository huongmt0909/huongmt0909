<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 64" width="100%" height="64">
  <defs>
    <linearGradient id="snkg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="50%"  stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="sglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="64" fill="#0d1117"/>

  <!-- Underline -->
  <rect x="0" y="60" height="2" fill="url(#snkg)" rx="1">
    <animate attributeName="width" from="0" to="800" dur="1.5s" fill="freeze" begin="0.2s"/>
  </rect>

  <!-- Snake path traveling -->
  <circle r="3" fill="#22c55e" filter="url(#sglow)">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath><path d="M0,61 C100,55 200,67 300,61 C400,55 500,67 600,61 C700,55 780,63 800,61"/></mpath>
    </animateMotion>
  </circle>
  <circle r="2" fill="#4ade80">
    <animateMotion dur="4s" begin="-1s" repeatCount="indefinite">
      <mpath><path d="M0,61 C100,55 200,67 300,61 C400,55 500,67 600,61 C700,55 780,63 800,61"/></mpath>
    </animateMotion>
  </circle>

  <!-- Snake emoji animated -->
  <text x="28" y="40" font-size="22" text-anchor="middle">
    🐍
    <animateTransform attributeName="transform" type="translate" values="0,0;2,-2;0,0;-2,2;0,0" dur="1s" repeatCount="indefinite"/>
  </text>

  <!-- Title -->
  <text x="62" y="39" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#f8fafc">
    Contribution Snake
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="0.1s"/>
  </text>
</svg>
